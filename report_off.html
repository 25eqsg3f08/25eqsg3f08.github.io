<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>留言展示</title>
</head>
<body>
<h2>GitHub Issues 列表</h2>
<div id="issues"></div>

<script>
  // 將文字中的 URL 轉成可點擊超連結
  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
  }

  // 渲染 Issues
  function renderIssues(issues, container, fromCache) {
    container.innerHTML = "";
    issues.forEach(issue => {
      // 🔹 過濾掉標題含有 "report" 的 Issue
      if (issue.title.toLowerCase().includes("report")) {
        return; // 跳過這個 Issue
      }

      const bodyText = issue.body ? linkify(issue.body.slice(0, 150)) : "(無內容)";
      const div = document.createElement("div");
      div.innerHTML = `
        <h3><a href="${issue.html_url}" target="_blank">${issue.title}</a></h3>
        <p>作者: ${issue.user.login}</p>
        <p>${bodyText}</p>
        ${fromCache ? "<small>(快取資料)</small>" : ""}
        <hr>
      `;
      container.appendChild(div);
    });
  }

  // 載入 Issues
  async function loadIssues() {
    const container = document.getElementById("issues");

    // 1. 先讀取快取
    const cached = localStorage.getItem("issuesCache");
    if (cached) {
      try {
        const issues = JSON.parse(cached);
        renderIssues(issues, container, true);
      } catch (e) {
        console.warn("快取解析失敗:", e);
      }
    }

    // 2. 嘗試抓取最新資料
    try {
      const res = await fetch("https://api.github.com/repos/25eqsg3f08/Issues/issues");
      if (!res.ok) throw new Error("HTTP 錯誤 " + res.status);
      const issues = await res.json();
      renderIssues(issues, container, false);
      // 更新快取
      localStorage.setItem("issuesCache", JSON.stringify(issues));
    } catch (err) {
      console.error("載入失敗:", err);
    }
  }

  loadIssues();
</script>
</body>
</html>
