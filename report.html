<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>全球留言展示</title>
</head>
<body>
  <h2>留言區</h2>

  <!-- utterances 評論系統 -->
  <script src="https://utteranc.es/client.js"
          repo="25eqsg3f08/Issues"
          issue-term="pathname"
          theme="github-light"
          crossorigin="anonymous"
          async>
  </script>

  <script>
    // 初始檢查
    if (!navigator.onLine) {
      window.location.href = "report_off.html";
    }

    // 監聽網絡狀態變化
    window.addEventListener("offline", () => {
      window.location.href = "report_off.html";
    });
  </script>
</body>
</html>
